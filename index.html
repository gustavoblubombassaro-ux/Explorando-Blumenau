<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Explorando Blumenau</title>
<style>
body {
  background-color: #9fd4a3;
  margin: 0;
  padding: 20px;
  font-family: sans-serif;
}

.titulo {
  background-color: white;
  border-radius: 15px;
  padding: 10px 20px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  margin: 0 auto 20px;
  max-width: 600px;
}

.container-fotos { 
  display: flex; 
  flex-wrap: wrap; 
  gap: 15px; 
  justify-content: center; 
  max-width: 1100px;
  margin: 0 auto;
}

.card-turistico {
  width: 200px;
}

.caixa-texto {
  background-color: white;
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
  width: 200px;
  margin-bottom: 8px;
}

.nome-local {
  font-family: sans-serif;
  font-weight: bold;
  font-size: 14px;
  color: #333333;
  margin: 0;
  margin-bottom: 4px;
}

.estrelas {
  color: #FFD700;
  font-size: 16px;
}

.turistico {
  background-color: #5ce6b0;
  border-radius: 20px;
  width: 200px;
  height: 200px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card-turistico:hover {
  transform: translateY(-6px);
}

.card-turistico:hover .turistico {
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.turistico img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<h1 class="titulo">LUGARES PARA PASSEAR EM BLUMENAU</h1>

<div class="container-fotos">
  
  <div class="card-turistico">

</div>

</body>
</html>
